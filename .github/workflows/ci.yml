name: TaskManager DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - stage
      - dev
  pull_request:
    branches: 
      - main
      - stage

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Verifica o repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalando python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalação de dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar lint com flake8
        run: flake8 todo_project --count --select=E9,F63,F7,F82 --show-source --statistics
  build:
    runs-on: ubuntu-latest
    needs: 
      - lint
    steps:
      - name: Verifica o repositório
        uses: actions/checkout@v4

      - name: Faz build da imagem Docker do projeto
        run: docker build -t taskmanager:latest .
  test:
    runs-on: ubuntu-latest
    needs: 
      - lint
      - build
    steps:
      - name: Verifica o repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalando python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalação de dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar testes com cobertura
        run: pytest --cov-report=xml
  sast:
    runs-on: ubuntu-latest
    needs: 
      - test
      - build
      - lint
    permissions:
        # Required for all workflows
        security-events: write
        # Only required for workflows in private repositories
        actions: read
        contents: read

    steps:
      - name: Verifica o repositório
        uses: actions/checkout@v4

      - name: Define a versão do Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalando Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Iniciando Scan do Bandit
        # Scans the package directory; change `todo_project` if needed
        run: |
          # Show human-readable report in the console
          bandit -r todo_project -f txt || true
          # Also produce machine-readable JSON and save while showing it
          bandit -r todo_project -f json | tee bandit.json || true

      - name: Upload do relatório do Bandit
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit.json
  dependency-check:
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
      - test
      - sast

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Define a versão do Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalação de dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalação do pip-audit
        run: python -m pip install pip-audit

      - name: Executar pip-audit e salvar relatório JSON
        run: |
          pip-audit -r requirements.txt || true
          pip-audit -r requirements.txt --format=json | tee pip-audit.json || true

      - name: Upload do relatório do pip-audit
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit.json
  dast:
    needs:
      - lint
      - build
      - test
      - sast
      - dependency-check

    runs-on: ubuntu-latest
    steps:
      - name: Verificando o repositório
        uses: actions/checkout@v4

      - name: Definindo a versão do Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalação de dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Criação da rede Docker e inicialização da aplicação
        run: |
          docker build -t taskmanager:latest .
          docker run -d --name taskmanager -p 5000:5000 taskmanager:latest
          sleep 10
        
      - name: Wait for application to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:5000 && echo "App ready" && break || sleep 3
          done

      - name: Run OWASP ZAP baseline scan (Docker)
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:5000'
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-report
          cmd_options: '-I'

      - name: Stop application container
        if: always()
        run: docker stop taskmanager || true
  stage:
    if: github.ref == 'refs/heads/stage' && github.event_name == 'pull_request' || github.ref == 'refs/heads/stage' && github.event_name == 'push' || github.ref == 'refs/heads/main' && github.event_name == 'pull_request' || github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: 
      - lint
      - build
      - test
      - sast
      - dependency-check
      - dast
    permissions:
      # Necessário para todos os workflows
      security-events: write
      # Somente necessário para repositórios privados
      actions: read
      contents: read
    

    steps:
      - name: Verificando o repositório
        uses: actions/checkout@v4

      - name: Criando imagem do ambiente de stage
        run: |
          docker build -t taskmanager:stage .
      
      - name: Instância de container em ambiente de stage
        run: |
          docker run -d --name taskmanager-stage -p 8443:5000 taskmanager:stage
          sleep 10
      
      - name: Verificando estado da aplicação em stage
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8443 && echo "Aplicação pronta" && break || sleep 3
          done
    
      - name: Validando aplicação 
        run: |
          curl -I http://localhost:8443
      
      - name: Testes com DAST
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8443'
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-report-stage
          cmd_options: '-I'
      
      - name: Encerrando ambiente de stage
        if: always()
        run: docker stop taskmanager-stage || true
  
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'pull_request' || github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - lint
      - build 
      - test
      - sast
      - dependency-check
      - dast
    permissions:
      # Necessário para todos os workflows
      security-events: write
      # Somente necessário para repositórios privados
      actions: read
      contents: read
    
    steps:
      - name: Verificando o repositório
        uses: actions/checkout@v4

      - name: Criando imagem do ambiente de produção
        run: |
          docker build -t taskmanager:prod .
      
      - name: Instância de container em ambiente de produção
        run: |
          docker run -d --name taskmanager-prod -p 8000:5000 taskmanager:prod
          sleep 10
      
      - name: Verificando estado da aplicação em produção
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000 && echo "Aplicação pronta" && break || sleep 3
          done
    
      - name: Validando aplicação 
        run: |
          curl -I http://localhost:8000
      
      - name: Testes com DAST
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8000'
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-report-prod
          cmd_options: '-I'
      
      - name: Encerrando ambiente de produção
        if: always()
        run: docker stop taskmanager-prod || true
  feedback-monitoring:
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
      - test
    
    steps:
      - name: Verificando o repositório
        uses: actions/checkout@v4

      - name: Ajustando permissoes das pastas de dados
        run: |
          # Garante que a pasta local data exista antes do compose rodar
          mkdir -p ./prometheus/data
          
          # Aplica o chown para o UID do Prometheus (nobody)
          sudo chown -R 65534:65534 ./prometheus/data

          # Aplica o chown para o UID do Grafana (grafana)
          sudo chown -R 472:472 ./grafana

      - name: utilizando o docker compose para subir os serviços
        run: |
          docker compose -f docker-compose.yml up -d
          sleep 20
      - name: Validando aplicação
        run: |
          curl -fI http://localhost:5000

      - name: Validando Prometheus
        run: |
          curl -f -sS http://localhost:9090 > /dev/null

      - name: Validando Grafana
        run: |
          curl -fI http://localhost:3000  